# Setup
title: Kuter's Blog
tagline: The Jekyll Butler
paginate: 1
baseurl: ""
permalink: /:title/

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md

sass:
  sass_dir: _sass
  style: :compressed

pages_list:
  About: '/about'
  Archive: '/archive'
  Feed: '/atom.xml'
  Github: 'https://github.com/kuterd'

# TODO: Add analytics
# Options
# Replace this value and uncomment to enable Google Analytics tracking
ga_analytics: GTM-58B863J

# Specify the author for blog posts
author:
  name: Kuter Dinel
  url: https://githun.com/kuterd
  email: kuterdinel@gmail.com

# Custom vars
version: 3.0.0
